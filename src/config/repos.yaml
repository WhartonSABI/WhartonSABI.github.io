# WSABI Projects - Seminar, Lab, and Moneyball (public repos only)
# Deliverables: use path for GitHub blob, or url for external links (e.g. Wharton Research Notes)

seminar:
  org: WhartonSABI
  projects:
    - name: Curling Power Play Optimization
      repo: curlers
      highlights: [2026 CSAS Data Challenge Winner]
      description: A win-probability framework for power play deployment in mixed-doubles curling. Developed for the 2026 CSAS Data Challenge.
      deliverables:
        - label: Article
          url: https://wsb.wharton.upenn.edu/pulling-the-power-play-a-win-probability-strategy-for-mixed-doubles-curling/
        - label: CSAS 2026
          path: poster/poster.pdf
          icon: presentation
        - label: Project Report
          path: writeup/report.pdf
          icon: report
        - label: Interactive App
          url: /curlers
          icon: app
    - name: Rugby Expected Points
      repo: rugby-ep
      highlights: [In Review at JQAS]
      description: An expected-points framework for rugby union with applications to penalty decisions.
      preprint: https://arxiv.org/abs/2512.00312
    - name: "PRESS: A New Forechecking Metric for Hockey"
      repo: halo2026
      highlights: [2026 HALO Hackathon Finalist]
      description: Introduces a novel player-level forechecking metric for hockey. Developed for the 2026 HALO Hackathon.
      deliverables:
        - label: HALO 2026
          path: writeup/presentation.pdf
          icon: presentation
        - label: Project Report
          path: writeup/main.pdf
          icon: report

lab:
  org: WhartonSABI
  projects:
    - name: Archetypal NBA Player Acquisition
      repo: nba-lineups
      highlights: [Presented at CMSAC 2023]
      description: An clustering approach to identify NBA player acquisition targets.
      deliverables:
        - label: CMSAC 2023
          path: presentations/cmu.pdf
          icon: presentation
    - name: A Unified Server Quality Metric for Tennis
      repo: server-quality
      description: Constructs a server quality metric from point-by-point data using mixed-effects models.
      highlights: [Published in JSA, 2025 CMSAC RRC Winner]
      preprint: https://arxiv.org/abs/2602.08083
      deliverables:
        - label: CMSAC 2025
          path: presentations/cmsac2025.pdf
          icon: presentation
    - name: NFL Pass Rush B-T
      repo: nfl-elo
      description: Opponent-adjusted ratings for NFL pass rushers and blockers derived from HUDL tracking data.
      highlights: [In Review at JQAS, Presented at NESSIS 2025]
      preprint: https://arxiv.org/abs/2604.01491
      deliverables:
        - label: NESSIS 2025
          path: results/nflelo.pdf
          icon: presentation
    - name: xG+
      repo: xg-plus
      highlights: [In Review at JQAS, Presented at JSM 2025 & ASIS 2026]
      description: A more complete probabilistic framework for chance creation and goalscoring in soccer.
      preprint: https://arxiv.org/abs/2512.00203
      deliverables:
        - label: JSM 2025
          path: jsm2025/presentation.pdf
          icon: presentation
        - label: ASIS 2026
          path: asis2026/presentation.pdf
          icon: presentation

moneyball:
  org: Wharton-Moneyball
  projects:
    - name: Is the NBA Draft Lottery Rigged?
      repo: nba-draft-lottery
      highlights: [Published in the Fall 2025 WSA Journal]
      description: Conducts a permutation test to evaluate the fairness of the NBA draft lottery.
      deliverables:
        - label: Article
          url: https://wsb.wharton.upenn.edu/wp-content/uploads/2025/12/ZHENG_NBA_Draft_Lottery.pdf
    - name: "PRSS: A New Metric for QB Pocket Collapse"
      repo: qb-pressure
      highlights: [Published in the Fall 2025 WSA Journal]
      description: Develops a new metric for pocket collapse in football from NFL tracking data.
      deliverables:
        - label: Article
          url: https://wsb.wharton.upenn.edu/wp-content/uploads/2025/12/HAFIZ_PRSS-A-new-metric.pdf
    - name: Investigating Serve Effectiveness in Men's Tennis
      repo: serve-performance
      highlights: [Published in the Fall 2025 WSA Journal]
      description: Examines the determinants of serve effectiveness in men's tennis from ATP point-by-point data.
      deliverables:
        - label: Article
          url: https://wsb.wharton.upenn.edu/wp-content/uploads/2025/12/WIEAND-serve_performance.pdf
    - name: Lead Distance Optimization in the MLB
      repo: stolen-base-leads
      highlights: [Published in the Fall 2025 WSA Journal]
      description: Develops a run expectancy approach to lead distance optimization in the MLB from pitch-by-pitch data.
      deliverables:
        - label: Article
          url: https://wsb.wharton.upenn.edu/wp-content/uploads/2025/12/WHITNEY-EPSTEIN_Lead_Distance_Optimization.pdf
